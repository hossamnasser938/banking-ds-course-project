version: "3.9"
services:
  ui:
    build:
      context: ../../
      dockerfile: services/ui/Dockerfile
    ports:
      - "5173:80"
    deploy:
      replicas: 1

  edge-gateway:
    image: nginx:1.27
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/edge-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - authentication-service
      - observability-service
      - banking-load-balancer

  authentication-service:
    build:
      context: ../../
      dockerfile: services/authentication/Dockerfile
    environment:
      PORT: 8080
      ZONE: shared-zone
      NODE_ID: authentication-service-1
    deploy:
      replicas: 1

  observability-service:
    build:
      context: ../../
      dockerfile: services/observability/Dockerfile
    environment:
      PORT: 8080
      ZONE: shared-zone
      NODE_ID: observability-service-1
    deploy:
      replicas: 1

  banking-load-balancer:
    image: nginx:1.27
    volumes:
      - ./nginx/banking-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - banking-api-zone-a
      - banking-api-zone-b

  banking-api-zone-a:
    build:
      context: ../../
      dockerfile: services/banking/Dockerfile
    environment:
      PORT: 8080
      ZONE: zone-a
      NODE_ID: banking-api-zone-a-1
    deploy:
      replicas: 1

  banking-api-zone-b:
    build:
      context: ../../
      dockerfile: services/banking/Dockerfile
    environment:
      PORT: 8080
      ZONE: zone-b
      NODE_ID: banking-api-zone-b-1
    deploy:
      replicas: 1

  postgres-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking

  postgres-replica-a:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking

  postgres-replica-b:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking
