resolver 127.0.0.11 valid=5s ipv6=off;

upstream auth_service_local {
    zone auth_service_local 64k;
    server authentication-service:8080 resolve;
}

upstream banking_service_local_ha {
    zone banking_service_local_ha 64k;
    server banking-load-balancer:8080 resolve;
}

upstream observability_service_local {
    zone observability_service_local 64k;
    server observability-service:8080 resolve;
}

server {
    listen 80;
    server_name _;

    location /auth/ {
        proxy_pass http://auth_service_local;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /accounts/ {
        proxy_pass http://banking_service_local_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /transfers {
        proxy_pass http://banking_service_local_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /admin/nodes/ {
        proxy_pass http://observability_service_local;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://banking_service_local_ha;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
