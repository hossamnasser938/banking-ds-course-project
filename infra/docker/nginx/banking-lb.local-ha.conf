upstream banking_service_replicas_local {
    server banking-service-a:8080;
    server banking-service-b:8080;
}

server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://banking_service_replicas_local;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
