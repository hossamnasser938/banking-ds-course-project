resolver 127.0.0.11 valid=5s ipv6=off;

upstream banking_service_replicas_local {
    zone banking_service_replicas_local 64k;
    server banking-service-a:8080 resolve;
    server banking-service-b:8080 resolve;
}

server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://banking_service_replicas_local;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
