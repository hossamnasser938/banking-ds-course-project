upstream banking_api_replicas {
    server banking-api-zone-a:8080;
    server banking-api-zone-b:8080;
}

server {
    listen 8080;
    server_name _;

    location / {
        proxy_pass http://banking_api_replicas;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
