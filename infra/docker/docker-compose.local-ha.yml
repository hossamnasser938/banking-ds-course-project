version: "3.9"
services:
  edge-gateway:
    image: nginx:1.27
    ports:
      - "8080:80"
    volumes:
      - ./nginx/edge-gateway.local-ha.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - authentication-service
      - banking-load-balancer
      - observability-service

  authentication-service:
    image: node:20
    working_dir: /workspace/services/authentication
    command: sh -c "npm install && npm run start:dev"
    environment:
      PORT: 8080
      ZONE: local-zone-auth
      NODE_ID: authentication-service-local-1
    volumes:
      - ../../:/workspace

  banking-load-balancer:
    image: nginx:1.27
    volumes:
      - ./nginx/banking-lb.local-ha.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - banking-service-a
      - banking-service-b

  banking-service-a:
    image: node:20
    working_dir: /workspace/services/banking
    command: sh -c "npm install && npm run start:dev"
    environment:
      PORT: 8080
      ZONE: local-zone-banking-a
      NODE_ID: banking-service-local-a
      AUTH_SERVICE_URL: http://authentication-service:8080
    volumes:
      - ../../:/workspace
    depends_on:
      - postgres-primary

  banking-service-b:
    image: node:20
    working_dir: /workspace/services/banking
    command: sh -c "npm install && npm run start:dev"
    environment:
      PORT: 8080
      ZONE: local-zone-banking-b
      NODE_ID: banking-service-local-b
      AUTH_SERVICE_URL: http://authentication-service:8080
    volumes:
      - ../../:/workspace
    depends_on:
      - postgres-primary

  observability-service:
    image: node:20
    working_dir: /workspace/services/observability
    command: sh -c "npm install && npm run start:dev"
    ports:
      - "8083:8080"
    environment:
      PORT: 8080
      ZONE: local-zone-observability
      NODE_ID: observability-service-local-1
      AUTH_SERVICE_URL: http://authentication-service:8080
      OBSERVED_NODES_JSON: >-
        [{"nodeId":"banking-service-local-a","componentType":"banking-api","zone":"local-zone-banking-a","url":"http://banking-service-a:8080"},{"nodeId":"banking-service-local-b","componentType":"banking-api","zone":"local-zone-banking-b","url":"http://banking-service-b:8080"}]
    volumes:
      - ../../:/workspace

  ui:
    image: node:20
    working_dir: /workspace/services/ui
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    env_file:
      - ../../.env
    volumes:
      - ../../:/workspace

  postgres-primary:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: banking
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/var/lib/postgresql/data

volumes:
  postgres_primary_data:
